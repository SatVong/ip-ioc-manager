#version: '3.8'

services:
  database:
    image: postgres:16-alpine
    container_name: ipioc-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-ipioc_db}
      POSTGRES_USER: ${DB_USER:-postgres-ip-manager}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vhtuajmsavdshs213fvsdcv}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres-ip-manager} -d ${DB_NAME:-ipioc_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ipioc-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ipioc-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-ipioc_db}
      DB_USER: ${DB_USER:-postgres-ip-manager}
      DB_PASSWORD: ${DB_PASSWORD:-vhtuajmsavdshs213fvsdcv}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: 7d
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - ipioc-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ipioc-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - ipioc-network

volumes:
  postgres_data:

networks:
  ipioc-network:
    driver: bridge