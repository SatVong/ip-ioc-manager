<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Страница не найдена</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 500px;
    }
    .error-code {
      font-size: 120px;
      font-weight: 800;
      background: linear-gradient(135deg, #ef4444, #f97316);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 8px;
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #f1f5f9;
    }
    p {
      font-size: 15px;
      color: #94a3b8;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .image-placeholder {
      width: 200px;
      height: 200px;
      margin: 0 auto 32px;
      border: 2px dashed #334155;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #475569;
      font-size: 14px;
      text-align: center;
      padding: 16px;
      background: #1e293b;
      user-select: none;
    }
    .image-placeholder svg {
      width: 64px;
      height: 64px;
      color: #475569;
    }
    .btn {
      display: inline-block;
      padding: 12px 32px;
      background: #2563eb;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      transition: background 0.2s;
    }
    .btn:hover { background: #1d4ed8; }
    .hint {
      margin-top: 24px;
      font-size: 13px;
      color: #64748b;
    }
    .hint code {
      background: #1e293b;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-code">404</div>
    <h1>Страница не найдена</h1>
    <p>Запрашиваемая страница не существует или была перемещена.</p>

    <!-- ████████████████████████████████████████████████████████ -->
    <!--  ВСТАВЬТЕ СВОЮ КАРТИНКУ ВМЕСТО ЭТОГО ПЛЕЙСХОЛДЕРА       -->
    <!--  Замените содержимое <div class="image-placeholder">     -->
    <!--  на <img src="..." alt="...">                            -->
    <!-- ████████████████████████████████████████████████████████ -->
    <div class="image-placeholder">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909M3.75 21h16.5A2.25 2.25 0 0022.5 18.75V5.25A2.25 2.25 0 0020.25 3H3.75A2.25 2.25 0 001.5 5.25v13.5A2.25 2.25 0 003.75 21z"/>
      </svg>
    </div>
    <!-- ████████████████████████████████████████████████████████ -->
    <!--  Пример: <img src="/images/my-404-picture.png"          -->
    <!--            alt="Страница не найдена" style="max-width: 100%;"> -->
    <!-- ████████████████████████████████████████████████████████ -->

    <a href="/" class="btn">На главную</a>
    <div class="hint">
      Путь: <code><span id="path"></span></code>
    </div>
  </div>
  <script>
    document.getElementById('path').textContent = window.location.pathname;
  </script>
</body>
</html>
